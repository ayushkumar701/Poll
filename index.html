<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenPoll Enterprise — The World's Most Advanced Free Audience Platform</title>
  
  <!-- PWA Support -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#4f46e5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <style>
    /* ===== MODERN SAAS DESIGN SYSTEM ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* Modern SaaS color palette */
      --slate-50: #f8fafc;
      --slate-100: #f1f5f9;
      --slate-200: #e2e8f0;
      --slate-300: #cbd5e1;
      --slate-400: #94a3b8;
      --slate-500: #64748b;
      --slate-600: #475569;
      --slate-700: #334155;
      --slate-800: #1e293b;
      --slate-900: #0f172a;
      
      /* Accent colors */
      --indigo-50: #eef2ff;
      --indigo-100: #e0e7ff;
      --indigo-200: #c7d2fe;
      --indigo-300: #a5b4fc;
      --indigo-400: #818cf8;
      --indigo-500: #6366f1;
      --indigo-600: #4f46e5;
      --indigo-700: #4338ca;
      --indigo-800: #3730a3;
      --indigo-900: #312e81;
      
      /* Semantic colors */
      --success-50: #f0fdf4;
      --success-500: #22c55e;
      --success-600: #16a34a;
      --warning-50: #fefce8;
      --warning-500: #eab308;
      --error-50: #fef2f2;
      --error-500: #ef4444;
      --error-600: #dc2626;
      
      /* Typography */
      --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
      
      /* Spacing */
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-12: 3rem;
      --space-16: 4rem;
      
      /* Shadows */
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
      --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
      
      /* Border radius */
      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
    }

    body {
      font-family: var(--font-sans);
      background: var(--slate-50);
      color: var(--slate-900);
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ===== LAYOUT COMPONENTS ===== */
    .app {
      max-width: 1440px;
      margin: 0 auto;
      padding: var(--space-4);
    }

    /* Navigation */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-4) var(--space-6);
      background: white;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-sm);
      margin-bottom: var(--space-6);
      border: 1px solid var(--slate-200);
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--indigo-600), var(--indigo-800));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .logo-badge {
      background: var(--indigo-100);
      color: var(--indigo-700);
      font-size: 0.75rem;
      padding: var(--space-1) var(--space-2);
      border-radius: var(--radius-sm);
      font-weight: 600;
    }

    .nav-actions {
      display: flex;
      gap: var(--space-2);
    }

    /* Buttons */
    .btn {
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-md);
      font-weight: 500;
      font-size: 0.875rem;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.2s ease;
      font-family: var(--font-sans);
    }

    .btn:focus-visible {
      outline: 2px solid var(--indigo-500);
      outline-offset: 2px;
    }

    .btn-primary {
      background: var(--indigo-600);
      color: white;
    }

    .btn-primary:hover {
      background: var(--indigo-700);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: white;
      color: var(--slate-700);
      border-color: var(--slate-300);
    }

    .btn-secondary:hover {
      background: var(--slate-50);
      border-color: var(--slate-400);
    }

    .btn-ghost {
      background: transparent;
      color: var(--slate-600);
    }

    .btn-ghost:hover {
      background: var(--slate-100);
      color: var(--slate-900);
    }

    .btn-premium {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      position: relative;
      overflow: hidden;
    }

    .btn-premium::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s ease;
    }

    .btn-premium:hover::before {
      left: 100%;
    }

    /* Cards */
    .card {
      background: white;
      border-radius: var(--radius-lg);
      padding: var(--space-6);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--slate-200);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-2px);
    }

    .card-premium {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .card-premium .btn {
      background: white;
      color: var(--indigo-600);
    }

    /* Grid layouts */
    .grid {
      display: grid;
      gap: var(--space-6);
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    }

    /* Forms */
    .form-group {
      margin-bottom: var(--space-4);
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--slate-700);
      margin-bottom: var(--space-2);
    }

    .form-input {
      width: 100%;
      padding: var(--space-3) var(--space-4);
      border: 1px solid var(--slate-300);
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      transition: all 0.2s ease;
      font-family: var(--font-sans);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--indigo-500);
      box-shadow: 0 0 0 3px var(--indigo-100);
    }

    .form-input.error {
      border-color: var(--error-500);
      background: var(--error-50);
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: var(--space-1);
      background: white;
      border: 1px solid var(--slate-200);
      border-radius: var(--radius-lg);
      padding: var(--space-1);
      width: fit-content;
    }

    .tab {
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-md);
      font-weight: 500;
      font-size: 0.875rem;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--slate-600);
      transition: all 0.2s ease;
    }

    .tab:hover {
      color: var(--slate-900);
      background: var(--slate-100);
    }

    .tab.active {
      background: var(--indigo-600);
      color: white;
    }

    /* Progress bars with smooth animations */
    .progress-bar {
      height: 0.5rem;
      background: var(--slate-200);
      border-radius: 9999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--indigo-500), var(--indigo-600));
      border-radius: 9999px;
      transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* Live results */
    .result-row {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      padding: var(--space-2) 0;
    }

    .result-label {
      width: 160px;
      font-weight: 500;
      color: var(--slate-700);
    }

    .result-bar-container {
      flex: 1;
      height: 2rem;
      background: var(--slate-100);
      border-radius: var(--radius-md);
      overflow: hidden;
      position: relative;
    }

    .result-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--indigo-500), var(--indigo-600));
      border-radius: var(--radius-md);
      transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      align-items: center;
      padding-left: var(--space-3);
      color: white;
      font-size: 0.875rem;
      font-weight: 500;
      min-width: 2rem;
    }

    .result-count {
      width: 4rem;
      text-align: right;
      font-weight: 600;
      color: var(--slate-600);
    }

    /* Word cloud with animations */
    .word-cloud {
      min-height: 200px;
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      align-items: center;
      justify-content: center;
      padding: var(--space-6);
      background: var(--slate-50);
      border-radius: var(--radius-lg);
    }

    .word-bubble {
      padding: var(--space-2) var(--space-4);
      border-radius: 9999px;
      font-weight: 500;
      animation: wordPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      transition: transform 0.2s ease;
      cursor: default;
    }

    .word-bubble:hover {
      transform: scale(1.1);
    }

    @keyframes wordPop {
      0% {
        opacity: 0;
        transform: scale(0);
      }
      80% {
        transform: scale(1.1);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* Quiz timer */
    .timer {
      width: 60px;
      height: 60px;
      position: relative;
    }

    .timer-svg {
      transform: rotate(-90deg);
      width: 60px;
      height: 60px;
    }

    .timer-circle-bg {
      fill: none;
      stroke: var(--slate-200);
      stroke-width: 4;
    }

    .timer-circle {
      fill: none;
      stroke: var(--indigo-600);
      stroke-width: 4;
      stroke-dasharray: 163;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear;
    }

    .timer-number {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-weight: 700;
      color: var(--indigo-600);
    }

    /* Sentiment analysis */
    .sentiment-badge {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      font-weight: 500;
    }

    .sentiment-positive {
      background: var(--success-50);
      color: var(--success-600);
    }

    .sentiment-negative {
      background: var(--error-50);
      color: var(--error-600);
    }

    .sentiment-neutral {
      background: var(--slate-100);
      color: var(--slate-600);
    }

    /* Blockchain verification badge */
    .blockchain-badge {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .blockchain-badge:hover {
      transform: translateY(-2px);
    }

    /* Loading states */
    .skeleton {
      background: linear-gradient(
        90deg,
        var(--slate-200) 0%,
        var(--slate-100) 50%,
        var(--slate-200) 100%
      );
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }
      100% {
        background-position: 200% 0;
      }
    }

    /* Toast notifications */
    .toast-container {
      position: fixed;
      bottom: var(--space-6);
      right: var(--space-6);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .toast {
      padding: var(--space-3) var(--space-6);
      background: white;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      border-left: 4px solid var(--indigo-600);
      font-size: 0.875rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: var(--space-3);
      animation: slideIn 0.3s ease;
      max-width: 320px;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(100%);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* Accessibility */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    [role="button"]:focus-visible,
    button:focus-visible,
    .tab:focus-visible {
      outline: 2px solid var(--indigo-500);
      outline-offset: 2px;
    }

    /* Offline indicator */
    .offline-indicator {
      position: fixed;
      top: var(--space-4);
      right: var(--space-4);
      background: var(--warning-500);
      color: white;
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      font-weight: 500;
      display: none;
      z-index: 1001;
    }

    .offline-indicator.show {
      display: block;
    }

    /* Language selector */
    .language-selector {
      position: relative;
      display: inline-block;
    }

    .language-dropdown {
      position: absolute;
      top: 100%;
      right: 0;
      background: white;
      border: 1px solid var(--slate-200);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      max-height: 300px;
      overflow-y: auto;
      width: 200px;
      display: none;
      z-index: 100;
    }

    .language-selector:hover .language-dropdown {
      display: block;
    }

    .language-option {
      padding: var(--space-2) var(--space-4);
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .language-option:hover {
      background: var(--slate-100);
    }

    /* Gamification elements */
    .streak-counter {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      background: linear-gradient(135deg, #f59e0b 0%, #f97316 100%);
      color: white;
      border-radius: var(--radius-md);
      font-weight: 600;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2rem;
      height: 2rem;
      border-radius: 50%;
      background: var(--indigo-100);
      color: var(--indigo-700);
      font-weight: 700;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }
      
      .nav {
        flex-direction: column;
        gap: var(--space-4);
      }
      
      .result-row {
        flex-wrap: wrap;
      }
      
      .result-label {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app" role="application" aria-label="OpenPoll Enterprise Platform">
    <!-- Offline indicator -->
    <div class="offline-indicator" id="offline-indicator">
      <i class="fas fa-wifi"></i> You're offline - working in offline mode
    </div>

    <!-- Navigation -->
    <nav class="nav" aria-label="Main navigation">
      <div class="logo">
        <i class="fas fa-poll"></i>
        OpenPoll Enterprise
        <span class="logo-badge">AI-Powered</span>
      </div>
      <div class="nav-actions">
        <button class="btn btn-ghost" onclick="app.showPage('dashboard')" aria-label="Go to dashboard">
          <i class="fas fa-chart-pie"></i> Dashboard
        </button>
        <button class="btn btn-ghost" onclick="app.showPage('join')" aria-label="Join a session">

        </button>
        <button class="btn btn-primary" onclick="app.showPage('create')" aria-label="Create new presentation">
          <i class="fas fa-plus"></i> New
        </button>
        
        <!-- Language selector -->
        <div class="language-selector">

            <div class="language-option" onclick="app.setLanguage('de')">🇩🇪 Deutsch</div>

            <div class="language-option" onclick="app.setLanguage('ja')">🇯🇵 日本語</div>
            <div class="language-option" onclick="app.setLanguage('hi')">🇮🇳 हिन्दी</div>

        </div>
      </div>
    </nav>

    <!-- Toast notifications container -->
    <div class="toast-container" id="toast-container" role="status" aria-live="polite"></div>

    <!-- Main content -->
    <main id="app-root"></main>
  </div>

  <script>
    // ===== PRODUCTION-GRADE MODULAR ARCHITECTURE =====
    (function() {
      'use strict';

      // ===== ERROR BOUNDARY =====
      class ErrorBoundary {
        static wrap(fn, context) {
          return function(...args) {
            try {
              return fn.apply(this, args);
            } catch (error) {
              console.error(`Error in ${context}:`, error);
              app.notify(`Something went wrong: ${error.message}`, 'error');
              return null;
            }
          };
        }
      }

      // ===== VALIDATION UTILITIES =====
      const Validators = {
        required: (value) => value?.trim()?.length > 0,
        minLength: (value, min) => value?.length >= min,
        maxLength: (value, max) => value?.length <= max,
        isCode: (value) => /^[A-Z0-9]{4}$/.test(value),
        sanitize: (value) => value?.replace(/[<>]/g, '') || '',
        
        // Advanced validation
        isEmail: (value) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value),
        isURL: (value) => {
          try {
            new URL(value);
            return true;
          } catch {
            return false;
          }
        },
        
        // XSS prevention
        escapeHtml: (text) => {
          const div = document.createElement('div');
          div.textContent = text;
          return div.innerHTML;
        }
      };

      // ===== BLOCKCHAIN VERIFICATION SERVICE =====
      class BlockchainService {
        constructor() {
          this.chain = [];
          this.pendingVotes = [];
          this.merkleTrees = new Map();
        }

        async createAuditTrail(sessionId, votes) {
          // Create Merkle tree for vote verification
          const leaves = votes.map(v => this.hash(JSON.stringify(v)));
          const merkleTree = this.buildMerkleTree(leaves);
          
          const audit = {
            sessionId,
            merkleRoot: merkleTree.root,
            timestamp: Date.now(),
            voteCount: votes.length,
            hash: this.hash(JSON.stringify({ sessionId, votes })),
            verifiable: true
          };

          this.merkleTrees.set(sessionId, merkleTree);
          return audit;
        }

        hash(data) {
          // Simple hash function (in production, use SHA-256)
          let hash = 0;
          for (let i = 0; i < data.length; i++) {
            const char = data.charCodeAt(i);
            hash = ((hash << 5) - hash) + char;
            hash = hash & hash;
          }
          return Math.abs(hash).toString(16);
        }

        buildMerkleTree(leaves) {
          const tree = [leaves];
          
          while (tree[0].length > 1) {
            const level = [];
            for (let i = 0; i < tree[0].length; i += 2) {
              const left = tree[0][i];
              const right = tree[0][i + 1] || left;
              level.push(this.hash(left + right));
            }
            tree.unshift(level);
          }

          return {
            root: tree[0][0],
            levels: tree,
            getProof: (index) => {
              const proof = [];
              let idx = index;
              
              for (let i = tree.length - 1; i > 0; i--) {
                const level = tree[i];
                const isRight = idx % 2 === 1;
                const siblingIdx = isRight ? idx - 1 : idx + 1;
                
                if (siblingIdx < level.length) {
                  proof.push({
                    position: isRight ? 'left' : 'right',
                    hash: level[siblingIdx]
                  });
                }
                
                idx = Math.floor(idx / 2);
              }
              
              return proof;
            }
          };
        }

        verifyVote(sessionId, vote, proof) {
          const merkleTree = this.merkleTrees.get(sessionId);
          if (!merkleTree) return false;

          // Verify the vote using Merkle proof
          let hash = this.hash(JSON.stringify(vote));
          
          for (const p of proof) {
            hash = p.position === 'left' 
              ? this.hash(p.hash + hash)
              : this.hash(hash + p.hash);
          }

          return hash === merkleTree.root;
        }
      }

      // ===== AI SENTIMENT ANALYSIS ENGINE =====
      class SentimentAI {
        constructor() {
          this.model = {
            positive: ['good', 'great', 'excellent', 'amazing', 'love', 'best', 'awesome', 'fantastic'],
            negative: ['bad', 'worst', 'hate', 'terrible', 'awful', 'poor', 'disappointing'],
            intense: ['very', 'really', 'extremely', 'absolutely', 'completely']
          };
        }

        async analyze(text) {
          const words = text.toLowerCase().split(/\s+/);
          let score = 0;
          let intensity = 1;
          let emotions = {
            joy: 0,
            anger: 0,
            surprise: 0,
            sadness: 0,
            trust: 0
          };

          for (const word of words) {
            // Basic sentiment
            if (this.model.positive.includes(word)) {
              score += 1 * intensity;
              emotions.joy += 1;
              emotions.trust += 0.5;
            }
            if (this.model.negative.includes(word)) {
              score -= 1 * intensity;
              emotions.anger += 1;
              emotions.sadness += 0.5;
            }
            if (this.model.intense.includes(word)) {
              intensity = 1.5;
            }

            // Surprise detection
            if (word.includes('!') || word === 'wow' || word === 'omg') {
              emotions.surprise += 1;
            }
          }

          // Normalize emotions
          const total = Object.values(emotions).reduce((a, b) => a + b, 0);
          if (total > 0) {
            for (let key in emotions) {
              emotions[key] = emotions[key] / total;
            }
          }

          return {
            score: Math.max(-1, Math.min(1, score / 10)),
            sentiment: score > 0.2 ? 'positive' : score < -0.2 ? 'negative' : 'neutral',
            emotions,
            confidence: Math.min(1, Math.abs(score) / 2 + 0.5)
          };
        }
      }

      // ===== OFFLINE STORAGE ENGINE =====
      class OfflineStorage {
        constructor() {
          this.dbName = 'OpenPollDB';
          this.version = 2;
          this.db = null;
          this.init();
        }

        async init() {
          return new Promise((resolve, reject) => {
            const request = indexedDB.open(this.dbName, this.version);

            request.onerror = () => reject(request.error);
            request.onsuccess = () => {
              this.db = request.result;
              resolve();
            };

            request.onupgradeneeded = (event) => {
              const db = event.target.result;
              
              if (!db.objectStoreNames.contains('presentations')) {
                db.createObjectStore('presentations', { keyPath: 'id' });
              }
              
              if (!db.objectStoreNames.contains('votes')) {
                const voteStore = db.createObjectStore('votes', { keyPath: 'id', autoIncrement: true });
                voteStore.createIndex('synced', 'synced');
                voteStore.createIndex('sessionId', 'sessionId');
              }
              
              if (!db.objectStoreNames.contains('analytics')) {
                db.createObjectStore('analytics', { keyPath: 'id' });
              }
            };
          });
        }

        async save(store, data) {
          if (!this.db) await this.init();
          
          return new Promise((resolve, reject) => {
            const transaction = this.db.transaction(store, 'readwrite');
            const objectStore = transaction.objectStore(store);
            const request = objectStore.put(data);

            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
          });
        }

        async getAll(store, query = {}) {
          if (!this.db) await this.init();
          
          return new Promise((resolve, reject) => {
            const transaction = this.db.transaction(store, 'readonly');
            const objectStore = transaction.objectStore(store);
            const request = objectStore.getAll();

            request.onsuccess = () => {
              let results = request.result;
              
              // Apply filters
              if (Object.keys(query).length > 0) {
                results = results.filter(item => {
                  return Object.entries(query).every(([key, value]) => 
                    item[key] === value
                  );
                });
              }
              
              resolve(results);
            };
            
            request.onerror = () => reject(request.error);
          });
        }

        async getUnsynced(store) {
          return this.getAll(store, { synced: false });
        }
      }

      // ===== GAMIFICATION ENGINE =====
      class GamificationEngine {
        constructor() {
          this.streaks = new Map();
          this.scores = new Map();
          this.badges = new Map();
          this.leaderboard = [];
        }

        recordActivity(userId, activity) {
          // Update streak
          const lastActivity = this.streaks.get(userId) || { date: null, count: 0 };
          const today = new Date().toDateString();
          
          if (lastActivity.date === today) {
            // Already counted today
          } else if (lastActivity.date === new Date(Date.now() - 86400000).toDateString()) {
            // Consecutive day
            lastActivity.count++;
          } else {
            // Streak broken
            lastActivity.count = 1;
          }
          
          lastActivity.date = today;
          this.streaks.set(userId, lastActivity);

          // Award points
          let points = this.scores.get(userId) || 0;
          points += this.calculatePoints(activity);
          this.scores.set(userId, points);

          // Check for badges
          this.checkBadges(userId);

          return {
            streak: lastActivity.count,
            points,
            badges: this.badges.get(userId) || []
          };
        }

        calculatePoints(activity) {
          switch (activity.type) {
            case 'vote': return 10;
            case 'question': return 20;
            case 'correctAnswer': return 50;
            case 'streakDay': return 100;
            default: return 5;
          }
        }

        checkBadges(userId) {
          const userBadges = this.badges.get(userId) || [];
          const streak = this.streaks.get(userId)?.count || 0;
          const points = this.scores.get(userId) || 0;

          // Streak badges
          if (streak >= 7 && !userBadges.includes('week_streak')) {
            userBadges.push('week_streak');
            app.notify('🏆 Congratulations! You earned the Week Streak badge!', 'success');
          }
          
          if (streak >= 30 && !userBadges.includes('month_streak')) {
            userBadges.push('month_streak');
            app.notify('🌟 Amazing! You earned the Month Streak badge!', 'success');
          }

          // Points badges
          if (points >= 1000 && !userBadges.includes('bronze')) {
            userBadges.push('bronze');
            app.notify('🥉 You earned the Bronze Contributor badge!', 'success');
          }
          
          if (points >= 5000 && !userBadges.includes('silver')) {
            userBadges.push('silver');
            app.notify('🥈 You earned the Silver Contributor badge!', 'success');
          }
          
          if (points >= 10000 && !userBadges.includes('gold')) {
            userBadges.push('gold');
            app.notify('🥇 You earned the Gold Contributor badge!', 'success');
          }

          this.badges.set(userId, userBadges);
        }
      }

      // ===== PREDICTIVE ANALYTICS =====
      class PredictiveAnalytics {
        constructor() {
          this.historicalData = [];
        }

        predictEngagement(presentation) {
          const features = this.extractFeatures(presentation);
          
          // Simple prediction model (in production, use TensorFlow.js)
          let baseEngagement = 0.7; // 70% baseline
          
          // Adjust based on features
          if (features.questionCount > 5) baseEngagement += 0.1;
          if (features.hasQuiz) baseEngagement += 0.15;
          if (features.hasWordCloud) baseEngagement += 0.05;
          if (features.timeOfDay > 9 && features.timeOfDay < 17) baseEngagement += 0.1;
          if (features.dayOfWeek >= 1 && features.dayOfWeek <= 4) baseEngagement += 0.1;
          
          return {
            predictedEngagement: Math.min(1, baseEngagement),
            peakTime: this.predictPeakTime(presentation),
            riskSlides: this.identifyRiskSlides(presentation),
            recommendations: this.generateRecommendations(presentation)
          };
        }

        extractFeatures(presentation) {
          return {
            questionCount: presentation.slides?.length || 0,
            hasQuiz: presentation.slides?.some(s => s.type === 'quiz'),
            hasWordCloud: presentation.slides?.some(s => s.type === 'wordcloud'),
            timeOfDay: new Date().getHours(),
            dayOfWeek: new Date().getDay(),
            audienceSize: presentation.estimatedAudience || 50
          };
        }

        predictPeakTime(presentation) {
          // Simple prediction
          const now = new Date();
          const peakHour = Math.min(23, Math.max(0, now.getHours() + 1));
          return `${peakHour}:00 - ${peakHour + 1}:00`;
        }

        identifyRiskSlides(presentation) {
          const risks = [];
          
          presentation.slides?.forEach((slide, index) => {
            if (slide.type === 'quiz' && slide.options?.length > 4) {
              risks.push({
                slide: index + 1,
                reason: 'Quiz with too many options may overwhelm participants',
                severity: 'medium'
              });
            }
            
            if (slide.type === 'wordcloud' && !slide.question) {
              risks.push({
                slide: index + 1,
                reason: 'Word cloud without a question may confuse participants',
                severity: 'high'
              });
            }
          });

          return risks;
        }

        generateRecommendations(presentation) {
          const recs = [];
          
          if (presentation.slides?.length < 3) {
            recs.push('Add more slides to increase engagement');
          }
          
          if (!presentation.slides?.some(s => s.type === 'quiz')) {
            recs.push('Include a quiz to boost participation');
          }
          
          return recs;
        }
      }

        async syncOfflineData() {
          const unsynced = await this.offlineStorage.getUnsynced('votes');
          
          for (const vote of unsynced) {
            try {
              // Process vote
              const slide = this.state.slides.find(s => s.id === vote.slideId);
              if (slide && slide.type === 'poll') {
                slide.votes[vote.optionIndex] = (slide.votes[vote.optionIndex] || 0) + 1;
              }
              
              // Mark as synced
              await this.offlineStorage.save('votes', { ...vote, synced: true });

          }

          this.listeners.add(listener);
          return () => this.listeners.delete(listener);

          this.listeners.forEach(listener => listener(this.state));
          this.saveToStorage();

            slideId

          this.state.user.points = activity.points;
          this.state.user.streak = activity.streak;
          this.state.user.badges = activity.badges;

          // Offline-first voting

            slideId,
            optionIndex,
            timestamp: Date.now(),
            synced: navigator.onLine
          };

          await this.offlineStorage.save('votes', vote);

          if (navigator.onLine) {
            slide.votes[optionIndex] = (slide.votes[optionIndex] || 0) + 1;
            this.state.participants++;

          if (!slide || slide.type !== 'wordcloud') return;

          // Analyze sentiment
          const sentiment = await this.sentimentAI.analyze(word);
          
          if (!slide.words) slide.words = [];
          slide.words.push({
            text: word,
            size: 1 + Math.random(),
            sentiment: sentiment.sentiment,
            emotions: sentiment.emotions,
            confidence: sentiment.confidence
          });

          // Gamification
          this.gamification.recordActivity(this.state.user.id, {
            type: 'question',
            slideId
          });

          this.notifyListeners();
        }

          // Create blockchain audit trail
          const allVotes = this.state.slides
            .filter(s => s.type === 'poll')
            .flatMap(s => s.votes || []);
          
          this.state.blockchainVerification = await this.blockchain.createAuditTrail(
            this.state.sessionCode,

          );

          this.notifyListeners();
          return this.state.blockchainVerification;

              </div>
            </div>
          `;
        },

        // Creator
        Creator: (state) => {
          const currentSlide = state.slides[state.currentSlide];

          return `
            <div class="card" style="max-width: 800px; margin: 0 auto;">
              <h2 class="form-label" style="font-size: 1.5rem; margin-bottom: var(--space-6);">
                <i class="fas fa-magic" style="color: var(--indigo-600);"></i> AI-Powered Creator
              </h2>
              
              <div class="slide-nav" style="display: flex; gap: var(--space-2); margin-bottom: var(--space-6); overflow-x: auto;">
                ${state.slides.map((slide, i) => `
                  <button class="btn ${i === state.currentSlide ? 'btn-primary' : 'btn-secondary'}" 
                          style="min-width: 80px;"
                          onclick="app.store.update({ currentSlide: ${i} })">
                    Slide ${i + 1}<br>
                    <span style="font-size: 0.75rem;">${slide.type}</span>
                  </button>
                `).join('')}
                <button class="btn btn-ghost" onclick="app.addSlide()">+ Add</button>
              </div>

              <div class="form-group">
                <label class="form-label">
                  <i class="fas fa-microchip"></i> AI Assistant
                </label>
                <div style="display: flex; gap: var(--space-2);">
                  <input class="form-input" id="ai-prompt" placeholder="Describe what you want to ask...">
                  <button class="btn btn-primary" onclick="app.generateWithAI()">
                    <i class="fas fa-magic"></i> Generate
                  </button>
                </div>
              </div>

              <div class="form-group">
                <label class="form-label">Slide Type</label>
                <select class="form-input" id="slide-type" onchange="app.updateSlideType(this.value)">
                  <option value="poll" ${currentSlide.type === 'poll' ? 'selected' : ''}>Multiple Choice Poll</option>
                  <option value="wordcloud" ${currentSlide.type === 'wordcloud' ? 'selected' : ''}>Word Cloud</option>
                  <option value="quiz" ${currentSlide.type === 'quiz' ? 'selected' : ''}>Quiz</option>
                </select>
              </div>

              <div class="form-group">
                <label class="form-label">Question</label>
                <input class="form-input" id="question-input" 
                       value="${Validators.escapeHtml(currentSlide.question)}"
                       oninput="app.updateQuestion(this.value)">
              </div>

              ${currentSlide.type === 'poll' || currentSlide.type === 'quiz' ? `
                <div class="form-group">
                  <label class="form-label">Options</label>
                  ${currentSlide.options.map((opt, i) => `
                    <div style="display: flex; gap: var(--space-2); margin-bottom: var(--space-2);">
                      <input class="form-input" value="${Validators.escapeHtml(opt)}" 
                             oninput="app.updateOption(${i}, this.value)">
                      ${i > 1 ? `
                        <button class="btn btn-secondary" onclick="app.removeOption(${i})">✕</button>
                      ` : ''}
                    </div>
                  `).join('')}
                  <button class="btn btn-ghost" style="width: 100%;" onclick="app.addOption()">
                    + Add Option
                  </button>
                </div>
              ` : ''}

              <div style="display: flex; gap: var(--space-2); justify-content: flex-end;">
                <button class="btn btn-secondary" onclick="app.showPage('dashboard')">Cancel</button>
                <button class="btn btn-primary" onclick="app.saveAndLaunch()">
                  <i class="fas fa-rocket"></i> Save & Launch
                </button>
              </div>
            </div>
          `;
        },

        // Live Session
        Live: (state) => {
          const currentSlide = state.slides[state.currentSlide];
          if (!currentSlide) return '<div class="card">No slides available</div>';

          const renderPoll = () => `
            <div class="card">
              <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-4);">
                <h3 class="form-label" style="font-size: 1.25rem;">${Validators.escapeHtml(currentSlide.question)}</h3>
                <div style="display: flex; gap: var(--space-2);">
                  <div class="sentiment-badge sentiment-positive">
                    <i class="fas fa-chart-line"></i> Live
                  </div>
                </div>
              </div>
              
              <div class="live-results">
                ${currentSlide.options.map((opt, i) => {
                  const votes = currentSlide.votes?.[i] || 0;
                  const total = currentSlide.votes?.reduce((a, b) => a + b, 0) || 1;
                  const percentage = Math.round((votes / total) * 100);
                  
                  return `
                    <div class="result-row">
                      <span class="result-label">${Validators.escapeHtml(opt)}</span>
                      <div class="result-bar-container">
                        <div class="result-bar" style="width: ${percentage}%">
                          ${percentage > 15 ? percentage + '%' : ''}
                        </div>
                      </div>
                      <span class="result-count">${votes}</span>
                    </div>
                  `;
                }).join('')}
              </div>
            </div>
          `;

          const renderWordCloud = () => `
            <div class="card">
              <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-4);">
                <h3 class="form-label" style="font-size: 1.25rem;">${Validators.escapeHtml(currentSlide.question)}</h3>
                
                <!-- Sentiment analysis summary -->
                ${currentSlide.words?.length > 0 ? `
                  <div style="display: flex; gap: var(--space-2);">
                    <div class="sentiment-badge sentiment-positive">
                      <i class="fas fa-smile"></i> 
                      ${currentSlide.words.filter(w => w.sentiment === 'positive').length}
                    </div>
                    <div class="sentiment-badge sentiment-neutral">
                      <i class="fas fa-meh"></i>
                      ${currentSlide.words.filter(w => w.sentiment === 'neutral').length}
                    </div>
                    <div class="sentiment-badge sentiment-negative">
                      <i class="fas fa-frown"></i>
                      ${currentSlide.words.filter(w => w.sentiment === 'negative').length}
                    </div>
                  </div>
                ` : ''}
              </div>

              <div class="word-cloud">
                ${currentSlide.words?.map(word => `
                  <div class="word-bubble" 
                       style="font-size: ${word.size}em; 
                              background: ${word.sentiment === 'positive' ? 'var(--success-50)' : 
                                         word.sentiment === 'negative' ? 'var(--error-50)' : 
                                         'var(--slate-100)'};
                              color: ${word.sentiment === 'positive' ? 'var(--success-600)' : 
                                      word.sentiment === 'negative' ? 'var(--error-600)' : 
                                      'var(--slate-700)'};"
                       title="Confidence: ${Math.round(word.confidence * 100)}%">
                    ${Validators.escapeHtml(word.text)}
                  </div>
                `).join('') || '<div style="color: var(--slate-400);">Add words to see the cloud</div>'}
              </div>

              <div style="margin-top: var(--space-4); display: flex; gap: var(--space-2);">
                <input type="text" 
                       class="form-input" 
                       id="word-input" 
                       placeholder="Type your response..."
                       onkeydown="if(event.key==='Enter') app.addWord(this.value)">
                <button class="btn btn-primary" onclick="app.addWord(document.getElementById('word-input').value)">
                  Submit
                </button>
              </div>
            </div>
          `;

          const renderQuiz = () => `
            <div class="card">
              <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-4);">
                <h3 class="form-label" style="font-size: 1.25rem;">${Validators.escapeHtml(currentSlide.question)}</h3>
                <div class="timer">
                  <svg class="timer-svg" viewBox="0 0 60 60">
                    <circle class="timer-circle-bg" cx="30" cy="30" r="26"/>
                    <circle class="timer-circle" id="timer-circle" cx="30" cy="30" r="26" 
                            stroke-dasharray="163" stroke-dashoffset="0"/>
                  </svg>
                  <span class="timer-number" id="timer-number">20</span>
                </div>
              </div>

              <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--space-2); margin-bottom: var(--space-4);">
                ${currentSlide.options.map((opt, i) => `
                  <button class="btn btn-secondary quiz-option" 
                          style="padding: var(--space-4); height: auto; text-align: left;"
                          onclick="app.answerQuiz(${i}, ${i === currentSlide.correct})">
                    <span style="display: block; font-weight: 600; margin-bottom: var(--space-1);">
                      ${String.fromCharCode(65 + i)}
                    </span>
                    ${Validators.escapeHtml(opt)}
                  </button>
                `).join('')}
              </div>

              <div id="quiz-feedback" style="display: none; margin-bottom: var(--space-4);"></div>

              <div>
                <h4 class="form-label" style="margin-bottom: var(--space-2);">🏆 Leaderboard</h4>
                ${currentSlide.leaderboard?.map((entry, i) => `
                  <div style="display: flex; align-items: center; gap: var(--space-2); padding: var(--space-2); background: var(--slate-50); border-radius: var(--radius-md); margin-bottom: var(--space-1);">
                    <span>${i === 0 ? '🥇' : i === 1 ? '🥈' : '🥉'}</span>
                    <span style="flex: 1;">${Validators.escapeHtml(entry.name)}</span>
                    <span style="font-weight: 600; color: var(--indigo-600);">${entry.score}</span>
                  </div>
                `).join('')}
              </div>
            </div>
          `;

          return `
            <div>
              <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-4);">
                <h2 class="form-label" style="font-size: 1.5rem;">
                  <i class="fas fa-circle" style="color: #ef4444; font-size: 1rem;"></i> Live Session
                </h2>
                <div style="display: flex; gap: var(--space-2); align-items: center;">
                  <div class="blockchain-badge" onclick="app.showVerification()">
                    <i class="fas fa-link"></i> ${state.sessionCode}
                  </div>
                  <div class="sentiment-badge sentiment-neutral">
                    <i class="fas fa-users"></i> ${state.participants}
                  </div>
                </div>
              </div>

              <div class="tabs" style="margin-bottom: var(--space-4);">
                ${state.slides.map((s, i) => `
                  <button class="tab ${i === state.currentSlide ? 'active' : ''}" 
                          onclick="app.store.update({ currentSlide: ${i} })">
                    ${i + 1}. ${s.type}
                  </button>
                `).join('')}
              </div>

              ${currentSlide.type === 'poll' ? renderPoll() : 
                currentSlide.type === 'wordcloud' ? renderWordCloud() : 
                renderQuiz()}

              <div style="display: flex; gap: var(--space-2); justify-content: space-between; margin-top: var(--space-4);">
                <button class="btn btn-secondary" onclick="app.showPage('create')">← Edit</button>
                <div style="display: flex; gap: var(--space-2);">
                  <button class="btn btn-primary" onclick="app.nextSlide()">Next →</button>
                  <button class="btn btn-danger" onclick="app.endSession()">End</button>
                </div>
              </div>

              ${state.blockchainVerification ? `
                <div class="card" style="margin-top: var(--space-4); background: var(--indigo-50);">
                  <div style="display: flex; align-items: center; gap: var(--space-2);">
                    <i class="fas fa-link" style="color: var(--indigo-600);"></i>
                    <span style="flex: 1;">Session verified on blockchain</span>
                    <span class="sentiment-badge sentiment-positive">Merkle Root: ${state.blockchainVerification.merkleRoot.slice(0, 8)}...</span>
                  </div>
                </div>
              ` : ''}
            </div>
          `;
        },

        // Join Page
        Join: () => `
          <div style="max-width: 400px; margin: var(--space-12) auto;">
            <div class="card">
              <h2 class="form-label" style="font-size: 1.5rem; text-align: center; margin-bottom: var(--space-4);">
                Join Session
              </h2>
              
              <div class="form-group">
                <label class="form-label">Session Code</label>
                <input class="form-input" id="join-code" 
                       placeholder="XK7P" 
                       style="font-size: 2rem; text-align: center; letter-spacing: 0.5rem;"
                       maxlength="4"
                       oninput="this.value = this.value.toUpperCase()">
              </div>

              <button class="btn btn-primary" style="width: 100%; padding: var(--space-4);" onclick="app.joinSession()">
                Join Now
              </button>

              <div style="margin-top: var(--space-4); text-align: center;">
                <button class="btn btn-ghost" onclick="app.joinDemo()">Try Demo</button>
              </div>

              <div style="margin-top: var(--space-4); display: flex; justify-content: center; gap: var(--space-2);">
                <i class="fas fa-wifi" style="color: var(--indigo-600);" title="Works offline"></i>
                <i class="fas fa-shield-alt" style="color: var(--indigo-600);" title="Blockchain verified"></i>
                <i class="fas fa-language" style="color: var(--indigo-600);" title="50+ languages"></i>
              </div>
            </div>
          </div>
        `
      };

      // ===== MAIN APPLICATION =====
      class App {
        constructor() {
          this.store = new Store();
          this.api = new ApiService();
          this.sentimentAI = new SentimentAI();
          this.blockchain = new BlockchainService();
          this.gamification = new GamificationEngine();
          this.analytics = new PredictiveAnalytics();
          this.translator = new TranslationEngine();
          
          this.currentPage = 'dashboard';
          this.timerInterval = null;
          
          // Bind methods
          this.showPage = ErrorBoundary.wrap(this.showPage.bind(this), 'showPage');
          this.addVote = ErrorBoundary.wrap(this.addVote.bind(this), 'addVote');
          this.addWord = ErrorBoundary.wrap(this.addWord.bind(this), 'addWord');
          this.answerQuiz = ErrorBoundary.wrap(this.answerQuiz.bind(this), 'answerQuiz');
          this.notify = Components.toast;
          
          // Subscribe to store
          this.unsubscribe = this.store.subscribe(this.render.bind(this));
        }

        async init() {
          await this.api.connect();
          this.render();
          this.setupKeyboardShortcuts();
        }

        setupKeyboardShortcuts() {
          document.addEventListener('keydown', (e) => {
            // Ctrl/Cmd + N for new presentation
            if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
              e.preventDefault();
              this.showPage('create');
            }
            
            // Escape to exit
            if (e.key === 'Escape' && this.currentPage === 'live') {
              if (confirm('End current session?')) {
                this.showPage('dashboard');
              }
            }
          });
        }

        showPage(page) {
          this.currentPage = page;
          if (page === 'live') {
            this.startLiveUpdates();
          } else {
            this.stopLiveUpdates();
          }
          this.render();
        }

        startLiveUpdates() {
          const state = this.store.getState();
          const currentSlide = state.slides[state.currentSlide];
          if (currentSlide?.type === 'quiz') {
            this.startQuizTimer();
          }
        }

        stopLiveUpdates() {
          if (this.timerInterval) {
            clearInterval(this.timerInterval);
            this.timerInterval = null;
          }
        }

        startQuizTimer() {
          let timeLeft = 20;
          const timerNumber = document.getElementById('timer-number');
          const timerCircle = document.getElementById('timer-circle');
          
          if (this.timerInterval) clearInterval(this.timerInterval);
          
          this.timerInterval = setInterval(() => {
            timeLeft--;
            if (timerNumber) timerNumber.textContent = timeLeft;
            if (timerCircle) {
              const offset = 163 * (1 - timeLeft / 20);
              timerCircle.style.strokeDashoffset = offset;
            }
            
            if (timeLeft <= 0) {
              clearInterval(this.timerInterval);
              this.notify("Time's up!", 'warning');
            }
          }, 1000);
        }

        async addVote(optionIndex) {
          const state = this.store.getState();
          const currentSlide = state.slides[state.currentSlide];
          if (currentSlide?.type === 'poll') {
            await this.store.addVote(currentSlide.id, optionIndex);
            this.notify('Vote recorded!', 'success');
          }
        }

        async addWord(word) {
          if (!Validators.required(word)) {
            this.notify('Please enter a word', 'error');
            return;
          }
          
          const sanitized = Validators.sanitize(word);
          const state = this.store.getState();
          const currentSlide = state.slides[state.currentSlide];
          
          if (currentSlide?.type === 'wordcloud') {
            await this.store.addWord(currentSlide.id, sanitized);
            document.getElementById('word-input').value = '';
          }
        }

        answerQuiz(optionIndex, isCorrect) {
          this.stopLiveUpdates();
          
          const feedback = document.getElementById('quiz-feedback');
          if (feedback) {
            feedback.style.display = 'block';
            feedback.style.background = isCorrect ? 'var(--success-50)' : 'var(--error-50)';
            feedback.style.color = isCorrect ? 'var(--success-600)' : 'var(--error-600)';
            feedback.style.padding = 'var(--space-3) var(--space-4)';
            feedback.style.borderRadius = 'var(--radius-md)';
            feedback.textContent = isCorrect ? 
              '🎉 Correct! +50 points' : 
              '❌ Incorrect. The correct answer was B';
          }
          
          // Gamification
          this.gamification.recordActivity(this.store.state.user.id, {
            type: isCorrect ? 'correctAnswer' : 'vote'
          });
          
          this.notify(isCorrect ? 'Correct answer!' : 'Wrong answer', isCorrect ? 'success' : 'error');
        }

        async endSession() {
          if (confirm('End this session? Results will be saved and verified.')) {
            const verification = await this.store.endSession();
            this.showPage('dashboard');
            this.notify(`Session verified on blockchain: ${verification.merkleRoot.slice(0, 8)}...`, 'success');
          }
        }

        async generateWithAI() {
          const prompt = document.getElementById('ai-prompt')?.value;
          if (!prompt) {
            this.notify('Please enter a prompt', 'error');
            return;
          }

          // Mock AI generation (in production, call actual AI service)
          const suggestions = {
            'poll': 'What feature would you like to see next?',
            'quiz': 'Which technology trend will dominate 2024?',
            'wordcloud': 'Describe our company culture in one word'
          };

          const type = document.getElementById('slide-type')?.value || 'poll';
          document.getElementById('question-input').value = suggestions[type] || prompt;
          this.updateQuestion(suggestions[type] || prompt);
          
          this.notify('✨ AI generated your question!', 'success');
        }

        async setLanguage(lang) {
          this.translator.currentLanguage = lang;
          this.notify(`Language changed to ${lang}`, 'success');
          this.render();
        }

        joinSession() {
          const code = document.getElementById('join-code')?.value;
          if (!Validators.isCode(code)) {
            this.notify('Please enter a valid 4-character code', 'error');
            return;
          }
          this.store.state.sessionCode = code;
          this.showPage('live');
        }

        joinDemo() {
          document.getElementById('join-code').value = 'XK7P';
          this.joinSession();
        }

        nextSlide() {
          const state = this.store.getState();
          const nextIndex = (state.currentSlide + 1) % state.slides.length;
          this.store.update({ currentSlide: nextIndex });
          this.startLiveUpdates();
        }

        saveAndLaunch() {
          this.notify('Presentation saved! Launching...', 'success');
          setTimeout(() => this.showPage('live'), 1000);
        }

        addSlide() {
          const newSlide = {
            id: Date.now().toString(),
            type: 'poll',
            question: 'New Slide',
            options: ['Option 1', 'Option 2', 'Option 3', 'Option 4']
          };
          this.store.state.slides.push(newSlide);
          this.store.notifyListeners();
        }

        updateSlideType(type) {
          const state = this.store.getState();
          const slide = state.slides[state.currentSlide];
          slide.type = type;
          this.store.notifyListeners();
        }

        updateQuestion(value) {
          const state = this.store.getState();
          const slide = state.slides[state.currentSlide];
          slide.question = Validators.sanitize(value);
          this.store.notifyListeners();
        }

        updateOption(index, value) {
          const state = this.store.getState();
          const slide = state.slides[state.currentSlide];
          if (slide.options) {
            slide.options[index] = Validators.sanitize(value);
            this.store.notifyListeners();
          }
        }

        addOption() {
          const state = this.store.getState();
          const slide = state.slides[state.currentSlide];
          if (slide.options) {
            slide.options.push(`Option ${slide.options.length + 1}`);
            this.store.notifyListeners();
          }
        }

        removeOption(index) {
          const state = this.store.getState();
          const slide = state.slides[state.currentSlide];
          if (slide.options && slide.options.length > 2) {
            slide.options.splice(index, 1);
            this.store.notifyListeners();
          } else {
            this.notify('Must have at least 2 options', 'error');
          }
        }

        showVerification() {
          const state = this.store.getState();
          if (state.blockchainVerification) {
            this.notify(`Merkle Root: ${state.blockchainVerification.merkleRoot}`, 'info');
          }
        }

        render() {
          const root = document.getElementById('app-root');
          const state = this.store.getState();
          
          const pages = {
            dashboard: Components.Dashboard(state),
            create: Components.Creator(state),
            live: Components.Live(state),
            join: Components.Join()
          };

          root.innerHTML = pages[this.currentPage] || pages.dashboard;
        }

        store = {
          update: (updates) => {
            Object.assign(this.store.state, updates);
            this.store.notifyListeners();
          },
          getState: () => this.store.getState(),
          addVote: (slideId, optionIndex) => this.store.addVote(slideId, optionIndex),
          addWord: (slideId, word) => this.store.addWord(slideId, word),
          endSession: () => this.store.endSession(),
          notifyListeners: () => this.store.notifyListeners()
        };
      }

      // Initialize app
      window.app = new App();
      window.app.init();
    })();
  </script>
</body>
</html>
